<svg viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D63E6"/>
      <stop offset="100%" stop-color="#2747C2"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#3a4de4"/>
    </linearGradient>
    <linearGradient id="leftpanel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2040c8"/>
      <stop offset="100%" stop-color="#3a56e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Left dark panel -->
  <rect x="0" y="0" width="520" height="628" fill="url(#leftpanel)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#btn)"/>

  <!-- Ghost number behind stat (left panel) -->
  <text x="260" y="430" font-family="Arial Black, Arial" font-size="340" font-weight="900"
        fill="#ffffff" opacity="0.07" text-anchor="middle">93</text>

  <!-- Big stat on left -->
  <text x="260" y="320" font-family="Arial Black, Arial" font-size="220" font-weight="900"
        fill="#ffffff" text-anchor="middle">93%</text>

  <!-- Stat label -->
  <text x="260" y="375" font-family="Arial, sans-serif" font-size="26" font-weight="700"
        fill="#c5d0ff" text-anchor="middle">van de Nederlanders heeft</text>
  <text x="260" y="410" font-family="Arial, sans-serif" font-size="26" font-weight="700"
        fill="#c5d0ff" text-anchor="middle">geen digitaal testament.</text>

  <!-- Source -->
  <text x="260" y="455" font-family="Arial, sans-serif" font-size="18"
        fill="#8899dd" text-anchor="middle">Bron: Nibud 2023</text>

  <!-- AfterFile logo (left, bottom of panel) -->
  <!-- Shield icon -->
  <svg x="50" y="536" width="36" height="36" viewBox="0 0 32 32">
    <path d="M16 2.5L27 7.1V15.3C27 22.9 22 28.1 16 30.2C10 28.1 5 22.9 5 15.3V7.1L16 2.5Z" fill="#ffffff" opacity="0.9"/>
    <path d="M9.2 10.6C11.2 9.3 13.5 8.6 16 8.6C18.5 8.6 20.8 9.3 22.8 10.6" fill="none" stroke="#3a56e0" stroke-width="1.7" stroke-linecap="round"/>
    <circle cx="16" cy="15.6" r="2.9" fill="none" stroke="#3a56e0" stroke-width="2.2"/>
    <rect x="14.7" y="18.5" width="2.6" height="6.8" fill="#3a56e0"/>
    <rect x="17.3" y="21.5" width="2.2" height="1.5" fill="#3a56e0"/>
    <rect x="17.3" y="23.9" width="2.8" height="1.5" fill="#3a56e0"/>
  </svg>
  <text x="95" y="561" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff">AfterFile</text>

  <!-- Right side content -->
  <!-- Question headline -->
  <text x="590" y="140" font-family="Arial Black, Arial" font-size="38" font-weight="900"
        fill="#1a2575">Wat gebeurt er na</text>
  <text x="590" y="188" font-family="Arial Black, Arial" font-size="38" font-weight="900"
        fill="#1a2575">jouw overlijden met je…</text>

  <!-- Feature list -->
  <!-- Row 1 -->
  <rect x="590" y="220" width="10" height="10" rx="5" fill="#3a4de4"/>
  <text x="612" y="232" font-family="Arial, sans-serif" font-size="23" fill="#374151">Bankrekeningen &amp; crypto</text>

  <rect x="590" y="258" width="10" height="10" rx="5" fill="#3a4de4"/>
  <text x="612" y="270" font-family="Arial, sans-serif" font-size="23" fill="#374151">Wachtwoorden &amp; inloggegevens</text>

  <rect x="590" y="296" width="10" height="10" rx="5" fill="#3a4de4"/>
  <text x="612" y="308" font-family="Arial, sans-serif" font-size="23" fill="#374151">Sociale media accounts</text>

  <rect x="590" y="334" width="10" height="10" rx="5" fill="#3a4de4"/>
  <text x="612" y="346" font-family="Arial, sans-serif" font-size="23" fill="#374151">Abonnementen &amp; verzekeringen</text>

  <rect x="590" y="372" width="10" height="10" rx="5" fill="#3a4de4"/>
  <text x="612" y="384" font-family="Arial, sans-serif" font-size="23" fill="#374151">Wensen voor je naasten</text>

  <!-- Divider -->
  <line x1="590" y1="420" x2="1150" y2="420" stroke="#dde3f8" stroke-width="1.5"/>

  <!-- Sub copy -->
  <text x="590" y="453" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">
    AfterFile legt alles vast en geeft het automatisch vrij.
  </text>
  <text x="590" y="480" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">
    Veilig versleuteld. 3 maanden gratis proberen.
  </text>

  <!-- CTA button -->
  <rect x="590" y="520" width="560" height="70" rx="14" fill="url(#btn)"/>
  <text x="870" y="562" font-family="Arial, sans-serif" font-size="24" font-weight="700"
        fill="white" text-anchor="middle">Start gratis op afterfile.nl →</text>
</svg>
