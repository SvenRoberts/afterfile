<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3D63E6"/><stop offset="100%" stop-color="#2747C2"/></linearGradient>
    <linearGradient id="afbtn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4f6ef7"/><stop offset="100%" stop-color="#3a4de4"/></linearGradient>
    <linearGradient id="iggrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f77737"/>
      <stop offset="30%" stop-color="#e1306c"/>
      <stop offset="65%" stop-color="#833ab4"/>
      <stop offset="100%" stop-color="#405de6"/>
    </linearGradient>
    <linearGradient id="bggrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f1a"/>
      <stop offset="100%" stop-color="#12101e"/>
    </linearGradient>
    <radialGradient id="igGlow" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#e1306c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="afGlow" cx="25%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#4f6ef7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bggrad)"/>
  <rect width="1080" height="1080" fill="url(#igGlow)"/>
  <rect width="1080" height="1080" fill="url(#afGlow)"/>

  <!-- Instagram logo top right (big, faded) -->
  <g transform="translate(720, 60)" opacity="0.18">
    <rect width="300" height="300" rx="68" fill="url(#iggrad)"/>
    <rect x="20" y="20" width="260" height="260" rx="54" fill="none" stroke="white" stroke-width="18"/>
    <circle cx="150" cy="150" r="62" fill="none" stroke="white" stroke-width="18"/>
    <circle cx="220" cy="80" r="18" fill="white"/>
  </g>

  <!-- Instagram logo (real size, sharp) top right -->
  <g transform="translate(846, 60)">
    <rect width="174" height="174" rx="40" fill="url(#iggrad)"/>
    <rect x="12" y="12" width="150" height="150" rx="30" fill="none" stroke="white" stroke-width="10"/>
    <circle cx="87" cy="87" r="36" fill="none" stroke="white" stroke-width="10"/>
    <circle cx="128" cy="46" r="10" fill="white"/>
  </g>

  <!-- Thin IG gradient accent line top -->
  <rect x="0" y="0" width="1080" height="5" fill="url(#iggrad)"/>

  <!-- Main quote -->
  <text x="72" y="190" font-family="Arial" font-size="66" font-weight="900" fill="white" letter-spacing="-2">Jouw Instagram</text>
  <text x="72" y="268" font-family="Arial" font-size="66" font-weight="900" fill="white" letter-spacing="-2">verdwijnt niet</text>
  <!-- "als jij doodgaat." in IG gradient -->
  <text x="72" y="346" font-family="Arial" font-size="66" font-weight="900" letter-spacing="-2">
    <tspan fill="url(#iggrad)">als jij doodgaat.</tspan>
  </text>

  <!-- Divider -->
  <rect x="72" y="378" width="500" height="3" rx="2" fill="url(#iggrad)" opacity="0.6"/>

  <text x="72" y="440" font-family="Arial" font-size="36" fill="#cccccc">Hij staat er gewoon. Voor altijd.</text>
  <text x="72" y="490" font-family="Arial" font-size="36" fill="#888">Terwijl niemand erbij kan.</text>

  <!-- VS battle: IG icon vs lock -->
  <g transform="translate(72, 560)">
    <!-- IG side -->
    <rect width="200" height="200" rx="30" fill="url(#iggrad)" fill-opacity="0.15" stroke="url(#iggrad)" stroke-width="1.5"/>
    <g transform="translate(60,40)">
      <rect width="80" height="80" rx="18" fill="url(#iggrad)"/>
      <rect x="6" y="6" width="68" height="68" rx="12" fill="none" stroke="white" stroke-width="5"/>
      <circle cx="40" cy="40" r="16" fill="none" stroke="white" stroke-width="5"/>
      <circle cx="60" cy="20" r="5" fill="white"/>
    </g>
    <text x="100" y="150" font-family="Arial" font-size="18" fill="#e1306c" text-anchor="middle" font-weight="700">Jouw profiel</text>
    <text x="100" y="174" font-family="Arial" font-size="15" fill="#888" text-anchor="middle">staat er voor altijd</text>

    <!-- Arrow -->
    <text x="230" y="110" font-family="Arial" font-size="48" fill="#444" text-anchor="middle">→</text>

    <!-- Lock side -->
    <g transform="translate(320, 0)">
      <rect width="200" height="200" rx="30" fill="#4f6ef7" fill-opacity="0.1" stroke="#4f6ef7" stroke-width="1.5"/>
      <g transform="translate(70, 34)">
        <rect x="0" y="30" width="60" height="46" rx="8" fill="#4f6ef7"/>
        <path d="M8 30 v-18 a22 22 0 0 1 44 0 v18" fill="none" stroke="#4f6ef7" stroke-width="8" stroke-linecap="round"/>
        <circle cx="30" cy="53" r="8" fill="white"/>
        <line x1="30" y1="61" x2="30" y2="70" stroke="white" stroke-width="5" stroke-linecap="round"/>
      </g>
      <text x="100" y="150" font-family="Arial" font-size="18" fill="#4f6ef7" text-anchor="middle" font-weight="700">Jouw naasten</text>
      <text x="100" y="174" font-family="Arial" font-size="15" fill="#888" text-anchor="middle">komen er nooit in</text>
    </g>
  </g>

  <!-- Bottom section -->
  <rect x="72" y="800" width="936" height="2" fill="#222"/>

  <text x="72" y="858" font-family="Arial" font-size="24" fill="#555">Regel je digitale nalatenschap voordat het te laat is.</text>

  <!-- AfterFile logo -->
  <svg x="72" y="883" width="80" height="80" viewBox="0 0 1024 1024">
    <g transform="translate(192,182) scale(20)">
      <path d="M16 2.5L27 7.1V15.3C27 22.9 22 28.1 16 30.2C10 28.1 5 22.9 5 15.3V7.1L16 2.5Z" fill="url(#sg)"/>
      <path d="M9.2 10.6C11.2 9.3 13.5 8.6 16 8.6C18.5 8.6 20.8 9.3 22.8 10.6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
      <circle cx="16" cy="15.6" r="2.9" fill="none" stroke="#fff" stroke-width="2.2"/>
      <rect x="14.7" y="18.5" width="2.6" height="6.8" fill="#fff"/>
      <rect x="17.3" y="21.5" width="2.2" height="1.5" fill="#fff"/>
      <rect x="17.3" y="23.9" width="2.8" height="1.5" fill="#fff"/>
    </g>
  </svg>
  <text x="164" y="924" font-family="Arial" font-size="32" font-weight="800" fill="white">AfterFile</text>
  <text x="164" y="952" font-family="Arial" font-size="17" fill="#555">afterfile.nl</text>

  <!-- CTA pill right -->
  <rect x="720" y="896" width="288" height="60" rx="30" fill="url(#afbtn)"/>
  <text x="864" y="932" font-family="Arial" font-size="20" font-weight="700" fill="white" text-anchor="middle">Probeer gratis →</text>
</svg>
