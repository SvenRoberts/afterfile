<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 628px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
  .card {
    width: 1200px; height: 628px;
    background: linear-gradient(135deg, #0f1b2d 0%, #1a2d4a 60%, #0f1b2d 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 64px 72px;
    position: relative;
  }
  .bg-circle {
    position: absolute; border-radius: 50%;
    background: rgba(100,180,255,0.04);
  }
  .bg-circle-1 { width: 500px; height: 500px; top: -120px; right: -80px; }
  .bg-circle-2 { width: 300px; height: 300px; bottom: -60px; left: 200px; }
  .left { flex: 1; z-index: 1; }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #a8c8f0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .headline {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -0.5px;
  }
  .headline span { color: #64b4f6; }
  .sub {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    line-height: 1.55;
    max-width: 480px;
    margin-bottom: 36px;
  }
  .link-pill {
    display: inline-block;
    background: rgba(100,180,246,0.15);
    border: 1px solid rgba(100,180,246,0.4);
    color: #64b4f6;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 24px;
    letter-spacing: 0.02em;
  }
  .right {
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 24px;
  }
  .logo-wrap {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 20px 32px;
  }
  .logo-wrap img { height: 44px; display: block; }
  .divider-x {
    width: 48px; height: 1px;
    background: rgba(255,255,255,0.2);
    align-self: flex-end;
    margin: 0 24px;
  }
  .partner-name {
    text-align: right;
  }
  .partner-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
  }
  .partner-title {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
  }
  .partner-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }
  .connector {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 4px;
  }
  .x-mark {
    font-size: 28px;
    font-weight: 300;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
