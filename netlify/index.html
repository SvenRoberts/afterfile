<body>
<div id="app">Laden…</div>
<!-- Statisch, verborgen "schaduw"-formulier: Netlify's build-bot leest dit bestand om
     formulieren te detecteren, maar kan het echte wachtlijst-formulier niet zien omdat
     dat door app.js in de pagina wordt gerenderd. Dit formulier wordt zelf nooit getoond;
     het zorgt er alleen voor dat Netlify Forms aanmeldingen accepteert en opslaat (zie
     https://docs.netlify.com/forms/setup/#javascript-rendered-forms). De échte indiening
     gebeurt via fetch() in de submit-handler in app.js. -->
<form name="waitlist" data-netlify="true" hidden>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="partner" />
  <input type="text" name="referral_source" />
  <input type="text" name="referral_other" />
</form>
<form name="partner-aanvraag" data-netlify="true" hidden>
  <input type="text" name="kantoor" />
  <input type="text" name="contactpersoon" />
  <input type="email" name="email" />
  <input type="text" name="type" />
  <input type="text" name="regio" />
</form>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
